<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="Inter, -apple-system, sans-serif">
  <rect width="1100" height="580" fill="#FAFAFA"/>

  <!-- ??? Row 1: Power flow ????????????????????????? -->
  <rect x="50" y="44" width="1000" height="108" rx="3" fill="#F2F2F2" stroke="#DCDCDC" stroke-width="0.75"/>
  <text x="76" y="76" font-size="9" fill="#999" font-weight="500" letter-spacing="2.5">POWER FLOWS</text>

  <!-- Nodes + arrows -->
  <text x="76"  y="116" font-size="18" fill="#1A1A1A" font-weight="500">IPP generation</text>
  <text x="268" y="116" font-size="22" fill="#C89455">&#8594;</text>
  <text x="298" y="116" font-size="18" fill="#1A1A1A" font-weight="500">Ground station</text>
  <text x="496" y="116" font-size="22" fill="#C89455">&#8594;</text>
  <text x="526" y="116" font-size="18" fill="#1A1A1A" font-weight="500">Stratospheric relay</text>
  <text x="762" y="116" font-size="22" fill="#C89455">&#8594;</text>
  <text x="792" y="116" font-size="18" fill="#1A1A1A" font-weight="500">Village</text>

  <text x="76"  y="138" font-size="12" fill="#999" font-style="italic">curtailed solar peak</text>
