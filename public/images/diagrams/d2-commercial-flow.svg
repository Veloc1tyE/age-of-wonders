  <text x="550" y="502" text-anchor="middle" font-size="15" fill="#555">Zero sovereign debt. No Lightway capital charge on ZETDC.</text>

  <!-- Source -->
  <text x="550" y="560" text-anchor="middle" font-size="11" fill="#BBBBBB" font-style="italic">Source: Aquila Space Technologies and NextEra, April 2026.</text>
