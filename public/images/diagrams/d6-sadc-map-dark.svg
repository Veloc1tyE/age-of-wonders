<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .country { fill: none; stroke: #D0D0D0; stroke-width: 0.9; }
      .light { fill: #24282E; stroke: #D0D0D0; stroke-width: 0.75; }
      .pipeline { fill: #6A4D2E; fill-opacity: 0.85; stroke: #FAE2B9; stroke-width: 1.25; }
      .label { font-size: 14px; fill: #FAFAFA; }
      .country-label { font-size: 13px; fill: #BBB; font-weight: 500; }
      .anchor-label { font-size: 20px; fill: #FAFAFA; font-weight: 500; }
      .serif-anno { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 15px; fill: #FAFAFA; font-style: italic; }
      .caption { font-size: 13px; fill: #AAA; }
    </style>
    <radialGradient id="glow-dark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB866" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#C89455" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C89455" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1100" fill="#1E2228"/>
  <!-- section-locator removed for visual cleanliness -->

  <!-- DRC -->
  <path class="light" d="M 250 140 L 660 140 L 700 250 L 640 330 L 500 350 L 360 330 L 280 270 Z"/>
  <text x="480" y="230" class="country-label" text-anchor="middle">Democratic Republic of the Congo</text>

  <!-- Tanzania -->
  <path class="light" d="M 680 190 L 900 190 L 960 260 L 950 370 L 840 370 L 740 320 L 690 260 Z"/>
  <text x="820" y="280" class="country-label" text-anchor="middle">Tanzania</text>

  <!-- Angola -->
  <path class="light" d="M 180 300 L 450 330 L 460 500 L 280 540 L 180 500 L 150 380 Z"/>
  <text x="310" y="420" class="country-label" text-anchor="middle">Angola</text>

  <!-- Zambia -->
  <path class="light" d="M 500 370 L 780 370 L 820 480 L 790 520 L 560 520 L 470 470 Z"/>
  <text x="650" y="445" class="country-label" text-anchor="middle">Zambia</text>

  <!-- Malawi -->
  <path class="light" d="M 860 380 L 925 380 L 940 530 L 890 560 L 855 500 Z"/>
  <text x="895" y="475" class="country-label" text-anchor="middle">Malawi</text>

  <!-- Mozambique PIPELINE -->
  <path class="pipeline" d="
    M 930 380 L 1100 360 L 1200 420 L 1180 550 L 1100 680 L 980 770
    L 900 720 L 880 620 L 900 520 Z"/>
  <text x="1060" y="500" class="country-label" text-anchor="middle" font-weight="500" fill="#FAE2B9">Mozambique</text>
  <text x="1060" y="518" class="serif-anno" text-anchor="middle" font-size="12" fill="#FAE2B9">Pipeline &#8212; principals active</text>

  <!-- Namibia -->
  <path class="light" d="M 170 530 L 430 540 L 440 700 L 360 770 L 220 750 L 160 680 Z"/>
  <text x="300" y="650" class="country-label" text-anchor="middle">Namibia</text>

  <!-- Botswana -->
  <path class="light" d="M 460 540 L 680 540 L 700 690 L 640 740 L 500 740 L 450 670 Z"/>
  <text x="575" y="640" class="country-label" text-anchor="middle">Botswana</text>

  <!-- ZIMBABWE (anchor) -->
  <circle cx="820" cy="580" r="340" fill="url(#glow-dark)"/>

  <path d="
    M 720 540 L 880 540 L 900 570 L 880 640 L 850 690 L 760 700 L 720 670 L 700 600 Z
  " fill="#E6A865" fill-opacity="0.95" stroke="#FAFAFA" stroke-width="1.5"/>

  <g transform="translate(810, 600)">
    <polygon points="0,-10 3,-3 10,-3 4,2 6,10 0,5 -6,10 -4,2 -10,-3 -3,-3" fill="#1A1A1A"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#1A1A1A" stroke-width="0.75"/>
  </g>

  <circle cx="880" cy="610" r="3.5" fill="#1A1A1A"/>

  <text x="800" y="500" class="anchor-label" text-anchor="middle">Zimbabwe</text>
  <text x="800" y="523" class="serif-anno" text-anchor="middle">SADC anchor regulatory node &#8212; IEC standard first-mover</text>
  <text x="800" y="732" class="serif-anno" text-anchor="middle" font-size="13">MOU signed 2026</text>

  <!-- South Africa PIPELINE -->
  <path class="pipeline" d="
    M 320 770 L 950 770 L 1000 870 L 780 930 L 560 910 L 380 870 Z"/>
  <text x="670" y="850" class="country-label" text-anchor="middle" font-weight="500" fill="#FAE2B9">South Africa</text>
  <text x="670" y="870" class="serif-anno" text-anchor="middle" font-size="12" fill="#FAE2B9">Pipeline &#8212; principals active</text>

  <ellipse cx="780" cy="850" rx="28" ry="22" class="light"/>
  <text x="780" y="855" class="country-label" text-anchor="middle" font-size="10">Lesotho</text>

  <ellipse cx="920" cy="820" rx="18" ry="16" class="light"/>
  <text x="920" y="823" class="country-label" text-anchor="middle" font-size="9">Eswatini</text>

  <path class="light" d="M 1340 500 L 1400 510 L 1430 650 L 1420 780 L 1360 800 L 1330 720 L 1310 600 Z"/>
  <text x="1370" y="650" class="country-label" text-anchor="middle">Madagascar</text>

  <circle cx="1480" cy="380" r="8" class="light"/>
  <text x="1485" y="400" class="country-label" font-size="10">Seychelles</text>

  <circle cx="1480" cy="660" r="8" class="light"/>
  <text x="1490" y="665" class="country-label" font-size="10">Mauritius</text>

  <circle cx="1190" cy="400" r="6" class="light"/>
  <text x="1195" y="415" class="country-label" font-size="10">Comoros</text>

  <!-- Pipeline dashed lines brighter amber -->
  <line x1="810" y1="600" x2="670" y2="850" stroke="#FFB866" stroke-width="1.75" stroke-dasharray="7 4"/>
  <line x1="810" y1="600" x2="1060" y2="500" stroke="#FFB866" stroke-width="1.75" stroke-dasharray="7 4"/>
  <circle cx="670" cy="850" r="6" fill="#1E2228" stroke="#FFB866" stroke-width="1.5"/>
  <circle cx="1060" cy="500" r="6" fill="#1E2228" stroke="#FFB866" stroke-width="1.5"/>

  <!-- Italic line at foot -->
  <text x="800" y="1030" class="serif-anno" text-anchor="middle" font-size="17">The regulatory architecture of optical transmission, in Southern Africa, is the architecture written first with the Republic of Zimbabwe.</text>

  <text x="800" y="1070" class="caption" text-anchor="middle">Diagram D6 &#8212; SADC First-Mover Map. Source: Aquila Space Technologies and NextEra, April 2026.</text>
</svg>
