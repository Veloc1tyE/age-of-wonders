<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Inter, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#FAFAFA"/>

  <!--
    Timeline: 2026 to 2037
    x = 80 + ((year - 2026) / 11) * 1040
    2026 -> 80     2027 -> 175    2029 -> 364    2030 -> 458
    2032 -> 647    2036 -> 1025   2037 -> 1120
  -->

  <!-- Year axis -->
  <line x1="80" y1="400" x2="1140" y2="400" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Year tick marks and labels -->
  <g font-size="11" fill="#888" text-anchor="middle">
    <line x1="80"   y1="395" x2="80"   y2="405" stroke="#CCCCCC"/>
    <text x="80"   y="422">2026</text>
    <line x1="175"  y1="395" x2="175"  y2="405" stroke="#CCCCCC"/>
    <text x="175"  y="422">2027</text>
    <line x1="364"  y1="395" x2="364"  y2="405" stroke="#CCCCCC"/>
    <text x="364"  y="422">2029</text>
    <line x1="458"  y1="395" x2="458"  y2="405" stroke="#CCCCCC"/>
    <text x="458"  y="422">2030</text>
    <line x1="647"  y1="395" x2="647"  y2="405" stroke="#CCCCCC"/>
    <text x="647"  y="422">2032</text>
    <line x1="1025" y1="395" x2="1025" y2="405" stroke="#CCCCCC"/>
    <text x="1025" y="422">2036</text>
  </g>

  <!-- MOU signature marker -->
  <line x1="80" y1="80" x2="80" y2="400" stroke="#1A1A1A" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="80" y="68" font-size="12" fill="#1A1A1A" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" text-anchor="middle">MOU signed</text>

  <!-- Vision 2030 marker -->
  <line x1="458" y1="80" x2="458" y2="400" stroke="#888" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="458" y="68" font-size="12" fill="#888" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" text-anchor="middle">Vision 2030 horizon</text>

  <!-- PHASE 1: 2027 to 2029 -->
  <rect x="175" y="100" width="189" height="54" rx="3" fill="#DCDCDC" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="269" y="126" font-size="14" fill="#1A1A1A" font-weight="500" text-anchor="middle">Phase 1</text>
  <text x="269" y="144" font-size="11" fill="#555" text-anchor="middle">Persistent aerial surveillance</text>
  <text x="175" y="176" font-size="11" fill="#888" font-style="italic">2027&#8211;2029 &#183; indicative window</text>

  <!-- PHASE 2: 2029 to 2032 -->
  <rect x="368" y="220" width="279" height="54" rx="3" fill="#F2D9BF" stroke="#C89455" stroke-width="1"/>
  <text x="507" y="246" font-size="14" fill="#1A1A1A" font-weight="500" text-anchor="middle">Phase 2</text>
  <text x="507" y="264" font-size="11" fill="#555" text-anchor="middle">Rural energy pilot &#183; Eastern Highlands</text>
  <text x="368" y="296" font-size="11" fill="#888" font-style="italic">2029&#8211;2032 &#183; tariff 60&#8211;70% below diesel</text>

  <!-- PHASE 3: 2032 onward, tapered -->
  <defs>
    <linearGradient id="taper3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#C89455" stop-opacity="0.75"/>
      <stop offset="80%" stop-color="#C89455" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C89455" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="651" y="340" width="489" height="54" rx="3" fill="url(#taper3)" stroke="none"/>
  <text x="860" y="366" font-size="14" fill="#1A1A1A" font-weight="500" text-anchor="middle">Phase 3</text>
  <text x="860" y="384" font-size="11" fill="#555" text-anchor="middle">National rollout &#183; SADC continental scale</text>
  <text x="651" y="416" font-size="11" fill="#888" font-style="italic">2032 and beyond</text>

  <!-- Connecting dashed guides between phases -->
  <line x1="364" y1="154" x2="368" y2="220" stroke="#BBBBBB" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="647" y1="274" x2="651" y2="340" stroke="#BBBBBB" stroke-width="0.6" stroke-dasharray="3 3"/>

  <!-- Sovereign exposure footnote -->
  <text x="80" y="454" font-size="11" fill="#707070" font-style="italic">Sovereign infrastructure-capital exposure: zero at every phase. Each phase proceeds under a separate binding agreement, executed only after its gate conditions are independently verified.</text>

  <!-- Caption -->
  <text x="600" y="482" text-anchor="middle" font-size="11" fill="#707070" font-style="italic">Diagram D5 &#183; Phased Roadmap &#183; Source: Aquila Space Technologies and NextEra, April 2026.</text>
</svg>
