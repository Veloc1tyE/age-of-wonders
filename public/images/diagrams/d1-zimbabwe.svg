<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .ink { fill: none; stroke: #1A1A1A; }
      .country { fill: none; stroke: #1A1A1A; stroke-width: 1; }
      .beam { stroke: #C89455; fill: none; stroke-linecap: round; }
      .label { font-size: 22px; fill: #1A1A1A; }
      .sublabel { font-size: 16px; fill: #555; }
      .anno { font-size: 14px; fill: #555; }
      .serif-anno { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 18px; fill: #1A1A1A; font-style: italic; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="#FAFAFA"/>

  <text x="1540" y="50" class="anno" text-anchor="end" font-style="italic">&#167;III.</text>

  <!--
    Simplified Zimbabwe outline.
    Coordinates (in approximate geographic shape) sit in lower 60% of the canvas,
    leaving the upper 40% for the stratospheric relay + beam arc.
  -->
  <path class="country" d="
    M 330 680
    L 340 620
    L 400 580
    L 470 555
    L 560 540
    L 640 540
    L 720 555
    L 790 560
    L 860 555
    L 940 540
    L 1020 530
    L 1110 525
    L 1180 545
    L 1240 595
    L 1260 665
    L 1250 740
    L 1220 800
    L 1175 840
    L 1115 870
    L 1040 880
    L 960 875
    L 880 865
    L 810 865
    L 740 880
    L 670 895
    L 605 900
    L 545 895
    L 490 875
    L 440 845
    L 395 805
    L 360 755
    L 340 710
    Z
  "/>

  <!-- Neighbours soft hints (no labels, very light) -->

  <!-- Stratospheric Relay (upper centre) -->
  <ellipse cx="790" cy="310" rx="150" ry="14" fill="#E8E8E8" stroke="#1A1A1A" stroke-width="1.25"/>
  <text x="790" y="280" class="label" text-anchor="middle" font-weight="500">Stratospheric Relay &#183; 20 km</text>
  <text x="790" y="345" class="sublabel" text-anchor="middle">above all weather, above all aviation</text>

  <!-- Generation Point (West &#8212; Hwange/Central Plateau approx) -->
  <circle cx="500" cy="660" r="7" fill="#1A1A1A"/>
  <text x="495" y="635" class="label" text-anchor="end" font-weight="500">Generation Point</text>
  <text x="495" y="655" class="sublabel" text-anchor="end">central plateau / Hwange</text>

  <!-- Ground Station (adjacent) -->
  <polygon points="520,650 510,670 530,670" fill="#1A1A1A"/>
  <text x="540" y="665" class="anno">Ground Station</text>

  <!-- End-Receiver (East &#8212; Mutare/Nyanga approx) -->
  <rect x="1105" y="665" width="70" height="38" class="ink" stroke-width="1.25"/>
  <text x="1140" y="689" class="label" text-anchor="middle" font-size="15" font-weight="500">Receiver</text>
  <text x="1190" y="660" class="label" font-weight="500">Eastern Highlands</text>
  <text x="1190" y="680" class="sublabel">Mutare &#183; Nyanga &#183; Chimanimani &#183; Chipinge</text>

  <!-- Amber beam arch -->
  <path d="M 520 650 Q 650 200 790 310" class="beam" stroke-width="3"/>
  <path d="M 790 310 Q 950 200 1130 665" class="beam" stroke-width="3"/>

  <!-- Terrain caption -->
  <text x="800" y="1000" class="serif-anno" text-anchor="middle">The beam passes over the terrain that no copper line can cross.</text>

  <!-- Caption block -->
  <text x="800" y="1060" class="anno" text-anchor="middle" fill="#707070">Diagram D1 &#8212; Network topology over Zimbabwe. Source: Aquila Space Technologies and NextEra, April 2026.</text>
</svg>
